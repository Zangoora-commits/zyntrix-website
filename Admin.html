<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TWIPID Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--surface:#0b0e1a;--card:#0f1322;--card2:#131829;
  --border:#1a2035;--border2:#243050;
  --blue:#2563eb;--cyan:#06d6f5;--electric:#00e5ff;
  --text:#eef2ff;--muted:#6b7db3;--hint:#2a3355;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --font-display:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
}
*{box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden}
input,select,textarea,button{font-family:var(--font-body)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── LOGIN SCREEN ─────────────────────────────────────────── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);position:relative;overflow:hidden}
.login-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(26,32,53,.4) 1px,transparent 1px),linear-gradient(90deg,rgba(26,32,53,.4) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at center,black 20%,transparent 75%)}
.login-box{position:relative;z-index:2;width:420px;background:var(--card);border:1px solid var(--border2);padding:48px 40px}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center}
.login-hex{width:36px;height:36px;background:var(--blue);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center}
.login-hex span{font-family:var(--font-mono);font-size:14px;color:#fff;font-weight:500}
.login-brand{font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:2px}
.login-brand .dot{color:var(--cyan)}
.login-badge{text-align:center;font-family:var(--font-mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:36px;padding:6px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.login-title{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px;text-align:center}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:32px}
.form-group{margin-bottom:16px}
.form-label{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.form-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 14px;font-size:14px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--blue)}
.form-input::placeholder{color:var(--hint)}
.btn-login{width:100%;background:var(--blue);color:#fff;border:none;padding:14px;font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background .2s;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{background:#1d4ed8}
.login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;padding:10px 14px;font-size:13px;margin-top:12px;display:none;font-family:var(--font-mono)}
.setup-note{background:rgba(6,214,245,.06);border:1px solid rgba(6,214,245,.15);padding:14px;margin-top:20px;font-size:12px;color:var(--muted);line-height:1.6}
.setup-note strong{color:var(--cyan);display:block;margin-bottom:4px;font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase}
.setup-note code{background:rgba(255,255,255,.05);padding:1px 5px;font-family:var(--font-mono);font-size:11px;color:var(--text)}

/* ── MAIN LAYOUT ──────────────────────────────────────────── */
#adminPanel{display:none;min-height:100vh;background:var(--bg)}
.admin-layout{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-brand{font-family:var(--font-display);font-size:16px;font-weight:800;letter-spacing:1.5px}
.sidebar-brand .dot{color:var(--cyan)}
.sidebar-role{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-section-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--hint);padding:8px 20px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;text-decoration:none;border-left:2px solid transparent}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.03)}
.nav-item.active{color:var(--cyan);background:rgba(6,214,245,.06);border-left-color:var(--cyan)}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--blue);color:#fff;font-family:var(--font-mono);font-size:10px;padding:2px 7px;border-radius:10px}
.sidebar-user{padding:16px 20px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.user-avatar{width:32px;height:32px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:12px;font-weight:500;flex-shrink:0}
.user-name{font-size:13px;font-weight:500}
.user-email{font-size:11px;color:var(--muted);font-family:var(--font-mono)}
.btn-logout{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font-mono);letter-spacing:1px;text-transform:uppercase}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* MAIN CONTENT */
.main-content{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:40}
.topbar-title{font-family:var(--font-display);font-size:16px;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 14px;font-size:12px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;font-family:var(--font-mono);letter-spacing:.5px}
.topbar-btn:hover{border-color:var(--border2);color:var(--text)}
.topbar-btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.topbar-btn.primary:hover{background:#1d4ed8}
.content-area{padding:28px;flex:1}

/* ── PAGE SECTIONS ─────────────────────────────────────────── */
.page{display:none}
.page.active{display:block}

/* DASHBOARD */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);padding:20px}
.stat-label{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-family:var(--font-display);font-size:28px;font-weight:800;letter-spacing:-1px}
.stat-change{font-size:12px;margin-top:4px;display:flex;align-items:center;gap:4px;font-family:var(--font-mono)}
.stat-up{color:var(--green)}
.stat-down{color:var(--red)}
.dashboard-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.card{background:var(--card);border:1px solid var(--border);padding:20px}
.card-title{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.card-title a{color:var(--cyan);cursor:pointer;text-decoration:none;font-size:9px}
.order-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.order-row:last-child{border-bottom:none}
.order-id{font-family:var(--font-mono);font-size:11px;color:var(--cyan);min-width:90px}
.order-customer{flex:1;color:var(--muted)}
.order-amount{font-family:var(--font-mono);font-size:13px;color:var(--text);min-width:80px;text-align:right}
.status-badge{font-family:var(--font-mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:2px}
.status-pending{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.status-processing{background:rgba(37,99,235,.1);color:var(--cyan);border:1px solid rgba(37,99,235,.2)}
.status-shipped{background:rgba(139,92,246,.1);color:#a78bfa;border:1px solid rgba(139,92,246,.2)}
.status-delivered{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.activity-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start;font-size:13px}
.activity-item:last-child{border-bottom:none}
.activity-icon{width:28px;height:28px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;margin-top:1px}
.activity-text{flex:1;color:var(--muted);line-height:1.5}
.activity-text strong{color:var(--text)}
.activity-time{font-family:var(--font-mono);font-size:10px;color:var(--hint)}

/* PRODUCTS PAGE */
.page-header{display:flex;align-items:center
